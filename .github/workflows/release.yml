name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            os: macos-latest
            cross: false
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: taiki-e/install-action@v2
        if: matrix.cross
        with:
          tool: cross
      - name: Bundle third-party licenses
        run: |
          cargo install cargo-bundle-licenses --locked
          cargo bundle-licenses --format yaml --output THIRDPARTY.yml
      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target "${{ matrix.target }}"
          else
            cargo build --release --target "${{ matrix.target }}"
          fi
      - name: Package
        run: |
          name="agentenv-${{ matrix.target }}"
          mkdir "$name"
          cp "target/${{ matrix.target }}/release/agentenv" LICENSE THIRDPARTY.yml README.md "$name/"
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: agentenv-${{ matrix.target }}
          path: |
            agentenv-*.tar.gz
            agentenv-*.tar.gz.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            agentenv-*.tar.gz
            agentenv-*.tar.gz.sha256
          generate_release_notes: true
